services:
  nginx:
    image: nginx:1.27-alpine
    container_name: plataforma360-nginx
    restart: always
    depends_on:
      php:
        condition: service_started
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      TZ: America/Recife
    volumes:
      - ./apps/core/public:/var/www/html/public:ro
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - plataforma360

  php:
    build:
      context: .
      dockerfile: infra/php/Dockerfile
    container_name: plataforma360-php
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-change-me-local-secret}
      APP_DEBUG: ${APP_DEBUG:-1}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Recife}
      DATABASE_URL: ${DATABASE_URL:-postgresql://plataforma360:plataforma360@postgres:5432/plataforma360?serverVersion=16&charset=utf8}
      RAW_STORAGE_DIR: ${RAW_STORAGE_DIR:-/var/storage/raw}
      CKAN_RESOURCE_TIMEOUT: ${CKAN_RESOURCE_TIMEOUT:-90}
      TZ: America/Recife
    volumes:
      - ./apps/core:/var/www/html
      - ./data:/var/data
      - ./storage:/var/storage
      - core_vendor:/var/www/html/vendor
      - core_var:/var/www/html/var
      - composer_cache:/tmp/composer-cache
    networks:
      - plataforma360

  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: plataforma360-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plataforma360}
      POSTGRES_USER: ${POSTGRES_USER:-plataforma360}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plataforma360}
      TZ: America/Recife
      PGTZ: America/Recife
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - plataforma360

  postgis:
    image: postgis/postgis:16-3.4-alpine
    container_name: plataforma360-postgis-tools
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-plataforma360}
      TZ: America/Recife
    command: >
      sh -c "while true; do
      psql -h postgres -U ${POSTGRES_USER:-plataforma360} -d ${POSTGRES_DB:-plataforma360} -c 'CREATE EXTENSION IF NOT EXISTS postgis; CREATE EXTENSION IF NOT EXISTS postgis_topology;' >/dev/null;
      sleep 3600;
      done"
    networks:
      - plataforma360

  adminer:
    image: adminer:4.8.1
    container_name: plataforma360-adminer
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      TZ: America/Recife
    networks:
      - plataforma360

  metabase:
    image: metabase/metabase:v0.52.9
    container_name: plataforma360-metabase
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${METABASE_PORT:-3000}:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${METABASE_DB_NAME:-metabase}
      MB_DB_PORT: 5432
      MB_DB_HOST: postgres
      MB_DB_USER: ${POSTGRES_USER:-plataforma360}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-plataforma360}
      MB_SITE_LOCALE: pt
      JAVA_TIMEZONE: America/Recife
      TZ: America/Recife
    volumes:
      - metabase_data:/metabase-data
    networks:
      - plataforma360

  # ─── IA LOCAL — Phase 5 ──────────────────────────────────────────────────────
  # Start with: docker compose --profile ai up -d
  # Install a model: docker compose exec ollama ollama pull llama3
  ollama:
    image: ollama/ollama:latest
    container_name: plataforma360-ollama
    restart: unless-stopped
    profiles: ["ai"]
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      TZ: America/Recife
    networks:
      - plataforma360

  # Vector Database — optional, used for RAG/embeddings
  qdrant:
    image: qdrant/qdrant:latest
    container_name: plataforma360-qdrant
    restart: unless-stopped
    profiles: ["ai"]
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      TZ: America/Recife
    networks:
      - plataforma360

  # ── Fase 6: Orquestração — perfil "ops" ──────────────────────────────────────
  # Para iniciar: docker compose --profile ops up -d

  kestra-postgres:
    image: postgres:16-alpine
    container_name: plataforma360-kestra-postgres
    profiles: ["ops"]
    restart: always
    environment:
      POSTGRES_DB: ${KESTRA_POSTGRES_DB:-kestra}
      POSTGRES_USER: ${KESTRA_POSTGRES_USER:-kestra}
      POSTGRES_PASSWORD: ${KESTRA_POSTGRES_PASSWORD:-kestra}
      TZ: America/Recife
      PGTZ: America/Recife
    volumes:
      - kestra_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - plataforma360

  kestra:
    image: kestra/kestra:latest-full
    container_name: plataforma360-kestra
    profiles: ["ops"]
    restart: always
    user: "root"
    command: server standalone --config /etc/kestra/application.yml
    depends_on:
      kestra-postgres:
        condition: service_healthy
    ports:
      - "${KESTRA_PORT:-8082}:8080"
    environment:
      TZ: America/Recife
    volumes:
      - ./future/kestra/application.yml:/etc/kestra/application.yml:ro
      - ./future/kestra/flows:/app/flows
      - ./future/kestra/examples:/app/examples:ro
      - kestra_storage:/app/storage
      - kestra_tmp:/tmp/kestra-wd
    networks:
      - plataforma360
  # ─────────────────────────────────────────────────────────────────────────────

networks:
  plataforma360:
    name: plataforma360-network
    driver: bridge

volumes:
  postgres_data:
    name: plataforma360-postgres-data
  composer_cache:
    name: plataforma360-composer-cache
  core_var:
    name: plataforma360-core-var
  core_vendor:
    name: plataforma360-core-vendor
  metabase_data:
    name: plataforma360-metabase-data
  ollama_data:
    name: plataforma360-ollama-data
  qdrant_data:
    name: plataforma360-qdrant-data
  kestra_postgres_data:
    name: plataforma360-kestra-postgres-data
  kestra_storage:
    name: plataforma360-kestra-storage
  kestra_tmp:
    name: plataforma360-kestra-tmp